<svg width="680" viewBox="0 0 680 504" role="img" xmlns="http://www.w3.org/2000/svg">
<title>detect() before and after the strategise / probe / derive refactor</title>
<desc>Before: detect() called five per-device-type helpers, each tangling enumerate, probe (I/O) and validate. After: three functions, one per concern — _strategise enumerates, _probe_ranges does all I/O, _derive_capabilities validates — each spanning every device type.</desc>
<style>
text{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif}
.t{font-size:14px;fill:#1a1a18}
.ts{font-size:12px;fill:#6b6a64}
.th{font-size:14px;font-weight:500;fill:#1a1a18}
.box{fill:#ffffff;stroke:#d3d1c7;stroke-width:.5}
.nf-teal{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.5}
.nt-teal{font-size:14px;fill:#085041}
.nu-teal{font-size:12px;fill:#0F6E56}
.nf-coral{fill:#FAECE7;stroke:#993C1D;stroke-width:.5}
.nt-coral{font-size:14px;fill:#712B13}
.nu-coral{font-size:12px;fill:#993C1D}
.nf-purple{fill:#EEEDFE;stroke:#534AB7;stroke-width:.5}
.nt-purple{font-size:14px;fill:#3C3489}
.nu-purple{font-size:12px;fill:#534AB7}
.nf-gray{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.5}
.nt-gray{font-size:14px;fill:#444441}
.nu-gray{font-size:12px;fill:#5F5E5A}
.ch-teal{fill:#5DCAA5;stroke:#0F6E56;stroke-width:.5}
.ch-coral{fill:#F0997B;stroke:#993C1D;stroke-width:.5}
.ch-purple{fill:#AFA9EC;stroke:#534AB7;stroke-width:.5}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="504" fill="#fcfbf8"/>

<text class="th" x="40" y="52" text-anchor="start">before — one method, mixed concerns</text>

<rect class="nf-gray" x="280" y="64" width="120" height="38" rx="6"/><text class="nt-gray" x="340" y="82" text-anchor="middle">detect()</text><text class="nu-gray" x="340" y="96" text-anchor="middle">one method</text>
<line class="arr" x1="340" y1="102" x2="340" y2="124" marker-end="url(#arrow)"/>

<rect class="box" x="46" y="126" width="108" height="72" rx="6"/><text class="th" x="100" y="143" text-anchor="middle">BCU</text>
<rect class="ch-purple" x="55" y="150" width="90" height="11" rx="2"/><rect class="ch-coral" x="55" y="164" width="90" height="11" rx="2"/><rect class="ch-teal" x="55" y="178" width="90" height="11" rx="2"/>

<rect class="box" x="166" y="126" width="108" height="72" rx="6"/><text class="th" x="220" y="143" text-anchor="middle">AIO</text>
<rect class="ch-purple" x="175" y="150" width="90" height="11" rx="2"/><rect class="ch-coral" x="175" y="164" width="90" height="11" rx="2"/><rect class="ch-teal" x="175" y="178" width="90" height="11" rx="2"/>

<rect class="box" x="286" y="126" width="108" height="72" rx="6"/><text class="th" x="340" y="143" text-anchor="middle">HV BMU</text>
<rect class="ch-purple" x="295" y="150" width="90" height="11" rx="2"/><rect class="ch-coral" x="295" y="164" width="90" height="11" rx="2"/><rect class="ch-teal" x="295" y="178" width="90" height="11" rx="2"/>

<rect class="box" x="406" y="126" width="108" height="72" rx="6"/><text class="th" x="460" y="143" text-anchor="middle">meters</text>
<rect class="ch-purple" x="415" y="150" width="90" height="11" rx="2"/><rect class="ch-coral" x="415" y="164" width="90" height="11" rx="2"/><rect class="ch-teal" x="415" y="178" width="90" height="11" rx="2"/>

<rect class="box" x="526" y="126" width="108" height="72" rx="6"/><text class="th" x="580" y="143" text-anchor="middle">LV batt</text>
<rect class="ch-purple" x="535" y="150" width="90" height="11" rx="2"/><rect class="ch-coral" x="535" y="164" width="90" height="11" rx="2"/><rect class="ch-teal" x="535" y="178" width="90" height="11" rx="2"/>

<rect class="box" x="120" y="206" width="440" height="24" rx="6"/><text class="ts" x="340" y="221" text-anchor="middle">enumerate + probe + validate tangled in each — duplicated ×5</text>

<line class="arr" x1="340" y1="236" x2="340" y2="264" marker-end="url(#arrow)"/>
<text class="ts" x="356" y="254" text-anchor="start">concerns pulled into 3 functions</text>

<text class="th" x="40" y="284" text-anchor="start">after — separated by role (#345)</text>

<rect class="nf-gray" x="275" y="294" width="130" height="38" rx="6"/><text class="nt-gray" x="340" y="312" text-anchor="middle">detect() loop</text><text class="nu-gray" x="340" y="326" text-anchor="middle">walks steps</text>
<line class="arr" x1="340" y1="332" x2="340" y2="352" marker-end="url(#arrow)"/>

<rect class="nf-purple" x="58" y="354" width="150" height="64" rx="6"/><text class="nt-purple" x="133" y="380" text-anchor="middle">_strategise</text><text class="nu-purple" x="133" y="398" text-anchor="middle">enumerate</text>
<line class="arr" x1="208" y1="386" x2="232" y2="386" marker-end="url(#arrow)"/>
<rect class="nf-coral" x="232" y="354" width="160" height="64" rx="6"/><text class="nt-coral" x="312" y="380" text-anchor="middle">_probe_ranges</text><text class="nu-coral" x="312" y="398" text-anchor="middle">probe · I/O seam</text>
<line class="arr" x1="392" y1="386" x2="416" y2="386" marker-end="url(#arrow)"/>
<rect class="nf-teal" x="416" y="354" width="190" height="64" rx="6"/><text class="nt-teal" x="511" y="380" text-anchor="middle">_derive_capabilities</text><text class="nu-teal" x="511" y="398" text-anchor="middle">validate</text>

<rect class="box" x="120" y="432" width="440" height="24" rx="6"/><text class="ts" x="340" y="447" text-anchor="middle">one function per concern — every device type flows through it</text>

<rect class="ch-purple" x="150" y="470" width="14" height="14" rx="3"/><text class="ts" x="170" y="481" text-anchor="start">enumerate</text>
<rect class="ch-coral" x="290" y="470" width="14" height="14" rx="3"/><text class="ts" x="310" y="481" text-anchor="start">probe (I/O)</text>
<rect class="ch-teal" x="430" y="470" width="14" height="14" rx="3"/><text class="ts" x="450" y="481" text-anchor="start">validate</text>
</svg>
