name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
          - finalize
      prerelease_stage:
        description: With major/minor/patch only — start a prerelease line (e.g. major + alpha → 2.0.0a1)
        required: false
        default: none
        type: choice
        options:
          - none
          - alpha
          - beta
          - rc

jobs:
  release:
    # Pure-Python package: the wheel is platform-independent, so a single
    # Ubuntu runner is sufficient. Cross-platform compatibility is already
    # validated on every push by dev.yml.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required for PyPI trusted publishing via OIDC (no API token).
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Check [Unreleased] has content
        run: python3 scripts/release.py check

      - name: Bump version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
          PRERELEASE_STAGE: ${{ inputs.prerelease_stage }}
        run: |
          CURRENT=$(uv version --short)
          # `prerelease_stage=none` (or unset) means no prerelease flag passed.
          if [ -n "$PRERELEASE_STAGE" ] && [ "$PRERELEASE_STAGE" != "none" ]; then
            NEW=$(python3 scripts/release.py bump "$CURRENT" "$BUMP" --prerelease "$PRERELEASE_STAGE")
          else
            NEW=$(python3 scripts/release.py bump "$CURRENT" "$BUMP")
          fi
          uv version "$NEW"
          uv lock
          echo "version=$NEW" >> $GITHUB_OUTPUT
          # Expose whether this is a prerelease so downstream steps can mark it.
          if [[ "$NEW" =~ (a|b|rc)[0-9]+$ ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Update CHANGELOG
        id: changelog
        run: |
          BODY=$(python3 scripts/release.py update "${{ steps.version.outputs.version }}")
          {
            echo 'body<<EOF'
            echo "$BODY"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md uv.lock
          git commit -m "chore: release ${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Build
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: dist/*.whl
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Notify downstream consumers
        env:
          # Fine-grained PAT with `Contents: write` on dewet22/givenergy-cli
          # and dewet22/givenergy-hass. If unset, the step skips with a warning
          # so the release flow doesn't break before the secret is configured.
          GH_TOKEN: ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::DOWNSTREAM_DISPATCH_TOKEN not set; skipping downstream notification"
            exit 0
          fi
          for repo in dewet22/givenergy-cli dewet22/givenergy-hass; do
            echo "Dispatching givenergy-modbus-release event to ${repo}"
            jq -nc --arg v "$VERSION" \
              '{event_type: "givenergy-modbus-release", client_payload: {version: $v}}' \
              | gh api -X POST "repos/${repo}/dispatches" --input -
          done

      # Skip docs publishing for prereleases so the public mkdocs site stays
      # pinned to the latest stable release.
      - name: Install docs dependencies
        if: steps.version.outputs.prerelease != 'true'
        run: uv sync --group docs

      - name: Build documentation
        if: steps.version.outputs.prerelease != 'true'
        run: uv run mkdocs build

      - name: Publish documentation
        if: steps.version.outputs.prerelease != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PERSONAL_TOKEN }}
          publish_dir: ./site
