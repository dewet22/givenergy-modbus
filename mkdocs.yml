site_name: GivEnergy Modbus
site_url: https://dewet22.github.io/givenergy-modbus
repo_url: https://github.com/dewet22/givenergy-modbus
repo_name: dewet22/givenergy-modbus
nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Architecture: architecture.md
  - Modules: api.md
  - Reference:
      - Register identification: register-identification.md
      - Hardware & firmware quirks: hardware-firmware-quirks.md
  - Contributing: contributing.md
  - Changelog: changelog.md
  - Release notes:
      - v2.0: release-notes/v2.0.md
  - Planning:
      - Post-v2.2 unified roadmap: post-v2.2-plan.md
      - v2.1 roadmap: v2.1-roadmap.md
      - Post-v2.0 improvement plan: post-v2-improvement-plan.md
      - Graph-shaped Plant (#106): plant-device-graph.md
theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.instant
    - navigation.tabs.sticky
markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      linenums: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.details
  - admonition
  - toc:
      baselevel: 2
      permalink: true
  - meta
plugins:
  - include-markdown
  - search:
      lang: en
  - mkdocstrings
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dewet22/givenergy-modbus
      name: Github
    - icon: material/email
      link: "mailto:givenergy-modbus@dewet.org"
